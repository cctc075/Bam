    <div class="progress-bar"></div>

    <section class="favorites-container">
    <h1 class="text-reveal" style="text-align: center; color: white; margin-bottom: 50px;">Song Favorites</h1>
    
    <div class="music-grid">
        
        <div class="music-card">
            <div class="music-art">
                <img src="favImg/OIP.webp" alt="Album Art">
            </div>
            <div class="music-info">
                <h3>พบรัก</h3>
                <p>Ink waranthorn X BILLKIN</p>
                <button class="play-btn" onclick="playMusic('พบรัก.mp3', this)">▶️ Play</button>
            </div>
        </div>

        <div class="music-card">
            <div class="music-art">
                <img src="favImg/คืนจันทร์.jpg" alt="Album Art">
            </div>
            <div class="music-info">
                <h3>คืนจันทร์</h3>
                <p>เสก โลโซ</p>
                <button class="play-btn" onclick="playMusic('คืนจันทร์.mp3', this)">▶️ Play</button>
            </div>
        </div>

        <div class="music-card">
            <div class="music-art">
                <img src="favImg/คืนที่ดาวเต็มฟ้า.jpg" alt="Album Art">
            </div>
            <div class="music-info">
                <h3>คืนที่ดาวเต็มฟ้า</h3>
                <p>โอ๊ต ปราโมทย์</p>
                <button class="play-btn" onclick="playMusic('คืนที่ดาวเต็มฟ้า.mp3', this)">▶️ Play</button>
            </div>
        </div>

        </div>

    <audio id="audio-player"></audio>
</section>
