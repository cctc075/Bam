<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Secure Access | NANTARAT</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url(images/4.jpg) center/cover no-repeat; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .lock-screen { text-align: center; color: white; width: 100%; max-width: 320px; }
        .prompt-text { font-weight: 300; margin-bottom: 30px; letter-spacing: 2px; }
        
        .passcode-dots { display: flex; justify-content: center; gap: 20px; margin-bottom: 60px; }
        .dot { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #fff; border-color: #fff; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .keypad button { 
            width: 75px; height: 75px; border-radius: 50%; border: none; 
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 1.5rem; 
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.2s;
        }
        .keypad button:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="lock-screen">
        <h2 class="prompt-text">Enter Passcode</h2>
        <div class="passcode-dots" id="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div> <div class="dot"></div> </div>
        <div class="keypad">
            <button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
            <button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
            <button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
            <button class="empty" style="visibility:hidden"></button>
            <button onclick="add(0)">0</button>
            <button onclick="del()">⌫</button>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
